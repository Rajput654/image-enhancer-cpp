version: '3.8'
services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - shared_data:/app/shared_volume
      - ./frontend:/app/frontend

  worker:
    build: 
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - redis
    volumes:
      - shared_data:/app/shared_volume

volumes:
  shared_data: